<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <i class="bi bi-telephone text-white display-6"></i>
                    <h5 class="text-white mt-2">CallFlowManager</h5>
                </div>
                <nav class="mt-3">
                    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="/dashboard/calls"><i class="bi bi-telephone me-2"></i> Llamadas</a>
                    <a href="/dashboard/customers"><i class="bi bi-people me-2"></i> Clientes</a>
                    <a href="/dashboard/agents" class="active"><i class="bi bi-person-badge me-2"></i> Agentes</a>
                    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </nav>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-person-badge"></i> Gestión de Agentes</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#agentModal">
                        <i class="bi bi-plus-lg"></i> Nuevo Agente
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>Teléfono</th>
                                    <th>Departamento</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="agentsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="agentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Agente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="agentForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="agentName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="agentEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" id="agentPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Departamento</label>
                            <input type="text" class="form-control" id="agentDept">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Crear Agente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadAgents() {
            const res = await fetch(API_URL + '/agents', { headers });
            const agents = await res.json();
            document.getElementById('agentsTableBody').innerHTML = agents.map(a => `
                <tr>
                    <td>${a.name}</td>
                    <td>${a.email}</td>
                    <td>${a.phone}</td>
                    <td>${a.department || '-'}</td>
                    <td><span class="badge bg-success">${a.status || 'active'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('agentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const agent = {
                name: document.getElementById('agentName').value,
                email: document.getElementById('agentEmail').value,
                phone: document.getElementById('agentPhone').value,
                department: document.getElementById('agentDept').value,
                status: 'active',
                active: true
            };
            const res = await fetch(API_URL + '/agents', { method: 'POST', headers, body: JSON.stringify(agent) });
            if (res.ok) {
                $('#agentModal').modal('hide');
                loadAgents();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
        loadAgents();
    </script>
</body>
</html>
