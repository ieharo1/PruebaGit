<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <i class="bi bi-telephone text-white display-6"></i>
                    <h5 class="text-white mt-2">CallFlowManager</h5>
                </div>
                <nav class="mt-3">
                    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="/dashboard/calls" class="active"><i class="bi bi-telephone me-2"></i> Llamadas</a>
                    <a href="/dashboard/customers"><i class="bi bi-people me-2"></i> Clientes</a>
                    <a href="/dashboard/agents"><i class="bi bi-person-badge me-2"></i> Agentes</a>
                    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </nav>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-telephone"></i> Gestión de Llamadas</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#callModal">
                        <i class="bi bi-plus-lg"></i> Nueva Llamada
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Cliente</th>
                                    <th>Agente</th>
                                    <th>Fecha/Hora</th>
                                    <th>Estado</th>
                                    <th>Duración</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="callsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="callModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva Llamada</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="callForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Cliente</label>
                            <select class="form-select" id="customerId" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Agente</label>
                            <select class="form-select" id="agentId" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha y Hora</label>
                            <input type="datetime-local" class="form-control" id="scheduledAt" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Programar Llamada</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadCustomers() {
            const res = await fetch(API_URL + '/customers', { headers });
            const customers = await res.json();
            document.getElementById('customerId').innerHTML = customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function loadAgents() {
            const res = await fetch(API_URL + '/agents', { headers });
            const agents = await res.json();
            document.getElementById('agentId').innerHTML = agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        }

        async function loadCalls() {
            const res = await fetch(API_URL + '/calls', { headers });
            const data = await res.json();
            document.getElementById('callsTableBody').innerHTML = data.data.map(c => `
                <tr>
                    <td>${c.customer_name}</td>
                    <td>${c.agent_name || '-'}</td>
                    <td>${new Date(c.scheduled_at).toLocaleString()}</td>
                    <td><span class="badge bg-${getStatusColor(c.status)}">${c.status}</span></td>
                    <td>${c.duration ? c.duration + ' min' : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary"><i class="bi bi-play"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = { scheduled: 'warning', in_progress: 'info', completed: 'success', missed: 'danger', cancelled: 'secondary' };
            return colors[status] || 'secondary';
        }

        document.getElementById('callForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const call = {
                customer_id: document.getElementById('customerId').value,
                agent_id: document.getElementById('agentId').value,
                scheduled_at: document.getElementById('scheduledAt').value
            };
            const res = await fetch(API_URL + '/calls', { method: 'POST', headers, body: JSON.stringify(call) });
            if (res.ok) {
                $('#callModal').modal('hide');
                loadCalls();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
        loadCustomers();
        loadAgents();
        loadCalls();
    </script>
</body>
</html>
